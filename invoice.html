<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#08080d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FAZGAME | Smart Invoice Suite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,700,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root {
            --bg: #050508;
            --surface: #101016;
            --surface-light: #181822;
            --accent: #FFD700;
            --accent-glow: rgba(255, 215, 0, 0.25);
            --text: #eef0f4;
            --text-dim: #9494a8;
            --border: #232332;
            --danger: #ff4a68;
            --success: #10b981;
            --font: 'Inter', system-ui, sans-serif;
            --radius-lg: 20px;
            --radius-md: 14px;
            --navbar-height: 70px;
            --safe-area-bottom: env(safe-area-inset-bottom, 16px);
            --header-bg: rgba(11, 11, 15, 0.5);
            --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); font-family: var(--font); color: var(--text);
            -webkit-font-smoothing: antialiased; padding-bottom: calc(var(--navbar-height) + var(--safe-area-bottom) + 20px);
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--header-bg); backdrop-filter: var(--glass-blur);
            border-bottom: var(--glass-border);
            padding: 12px 16px;
        }
        @media (min-width: 768px) { header { padding: 16px 24px; } }
        .header-inner {
            max-width: 1400px; margin: 0 auto; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 16px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-left .logo-img { height: 40px; width: auto; opacity: 0.95; }
        .header-left .logo-text {
            font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 24px;
            letter-spacing: -0.5px; white-space: nowrap;
        }
        .header-left .logo-text .yellow-text { color: var(--accent); }
        .header-right-group { display: flex; align-items: center; gap: 16px; }
        .header-logos { display: flex; gap: 12px; align-items: center; }
        .header-logos img { width: 20px; filter: invert(1); opacity: 0.7; transition: 0.2s; }
        .header-logos img:hover { opacity: 1; transform: translateY(-2px); }
        .btn-icon {
            padding: 14px; border-radius: var(--radius-md); background: var(--surface-light);
            color: var(--text); display: flex; align-items: center; justify-content: center;
            border: 1.5px solid var(--border); cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .btn-icon:active { transform: scale(0.95); }

        /* MAIN CONTAINER */
        .main-container { padding: 16px; display: flex; flex-direction: column; gap: 16px; max-width: 800px; margin: 0 auto; }

        /* CARDS */
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.2s;
        }
        .card-header {
            display: flex; align-items: center; gap: 12px; padding: 16px;
            font-weight: 700; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1px; color: var(--accent);
            cursor: pointer; user-select: none;
            background: rgba(255,215,0,0.02);
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }
        .card-header i:not(.toggle-arrow) { font-size: 1.1rem; width: 24px; }
        .card-header .toggle-arrow { margin-left: auto; transition: transform 0.3s; }
        .card.collapsible.collapsed .card-body { display: none; }
        .card.collapsible.collapsed .card-header { border-bottom-color: var(--border); }
        .card.collapsible.collapsed .toggle-arrow { transform: rotate(-90deg); }
        .card-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

        /* FORMS */
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
        .form-group label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-md);
            font-size: 15px; background: var(--surface-light); color: var(--text); width: 100%; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: rgba(255,215,0,0.02); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .input-error { border-color: var(--danger) !important; }

        /* BUTTONS */
        .btn {
            padding: 12px 18px; border-radius: var(--radius-md); border: none; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; font-family: var(--font); display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; background: var(--surface-light); color: var(--text); transition: 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-accent { background: var(--accent); color: #0a0a0f; box-shadow: 0 4px 12px var(--accent-glow); }
        .btn-sm { padding: 8px 14px; font-size: 0.8rem; }
        .btn-icon-danger { background: rgba(255,74,104,0.1); color: var(--danger); border: none; padding: 8px; border-radius: 8px; cursor: pointer; }

        /* FILE MANAGER */
        .file-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 8px;
        }
        .file-action-card {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-action-card:hover { border-color: var(--accent); background: rgba(255,215,0,0.05); transform: translateY(-2px); }
        .file-action-card i { font-size: 1.6rem; margin-bottom: 6px; display: block; color: var(--accent); }
        .file-action-card span { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .drive-status { font-size: 0.7rem; color: var(--success); display: flex; align-items: center; gap: 6px; padding: 8px 0; }
        .doc-list-container { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .doc-entry {
            display: flex; align-items: center; justify-content: space-between; padding: 10px 12px;
            background: var(--surface-light); border: 1px solid var(--border); border-radius: var(--radius-md);
        }
        .doc-entry-info { flex: 1; min-width: 0; }
        .doc-entry-title { font-size: 0.85rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .doc-entry-meta { font-size: 0.7rem; color: var(--text-dim); display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
        .doc-entry-type { color: var(--accent); font-weight: 800; background: rgba(255,215,0,0.1); padding: 2px 6px; border-radius: 12px; }
        .doc-entry-actions { display: flex; gap: 6px; }

        /* ITEMS */
        .item-search-area { position: relative; margin-bottom: 12px; }
        .search-input { width: 100%; padding: 12px 12px 12px 36px; border-radius: var(--radius-md); border: 1.5px solid var(--border); background: var(--surface-light); color: var(--text); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .search-dropdown { position: absolute; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); z-index: 50; display: none; margin-top: 4px; }
        .search-dropdown.show { display: block; }
        .dropdown-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .dropdown-item:active { background: rgba(255,215,0,0.1); }
        #itemsBody { display: flex; flex-direction: column; gap: 12px; }
        .item-entry-card { background: var(--surface-light); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; }
        .item-entry-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .item-math-row { display: flex; gap: 8px; margin-top: 8px; }
        .amount-display { font-size: 1rem; font-weight: 800; color: var(--accent); text-align: right; margin-top: 6px; }

        /* PREVIEW */
        .preview-wrapper { overflow-x: auto; padding: 20px 0; border-radius: var(--radius-lg); background: rgba(255,255,255,0.02); border: 1px dashed var(--border); }
        .invoice-preview { background: #ffffff; color: #1e293b; padding: 32px; width: 720px; font-size: 13px; line-height: 1.5; margin: 0 auto; }
        .inv-header { display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #1e293b; }
        .inv-header-left { display: flex; gap: 16px; align-items: flex-start; }
        .logo-box { width: 80px; flex-shrink: 0; }
        .logo-box img { width: 100%; height: auto; border-radius: 8px; object-fit: contain; background: #f8fafc; }
        .company-info { flex: 1; }
        .inv-title { font-size: 1.6rem; font-weight: 800; color: #0f172a; text-transform: uppercase; text-align: right; }
        .inv-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .inv-table th { background: #f1f5f9; padding: 10px 8px; font-size: 11px; text-transform: uppercase; font-weight: 700; color: #334155; }
        .inv-table td { padding: 12px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        .inv-table th.right, .inv-table td.right { text-align: right; }
        .inv-item-name { font-size: 0.95rem; font-weight: 800; color: #0f172a; display: block; margin-bottom: 4px; }
        .inv-item-detail { font-size: 0.75rem; color: #64748b; display: block; white-space: pre-line; line-height: 1.4; margin-top: 2px; }
        .totals-section { display: flex; justify-content: flex-end; margin-top: 12px; }
        .totals-table { width: 260px; }
        .totals-table td { padding: 6px 8px; }
        .grand-total { border-top: 2px solid #1e293b; }
        .paid-stamp { font-size: 2.5rem; font-weight: 900; color: #dc2626; border: 4px solid #dc2626; padding: 6px 20px; border-radius: 12px; transform: rotate(-12deg); opacity: 0.7; display: inline-block; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(16,16,22,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px calc(8px + var(--safe-area-bottom));
            z-index: 200;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dim);
            font-family: var(--font);
            font-size: 0.7rem;
            font-weight: 600;
        }
        .nav-btn i { font-size: 1.4rem; margin-bottom: 2px; }
        .nav-btn.active { color: var(--accent); background: rgba(255,215,0,0.1); }
        .nav-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.05); }
        .nav-btn-download {
            background: var(--accent);
            color: #0a0a0f !important;
            padding: 8px 20px;
            border-radius: 40px;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .nav-btn-download i { font-size: 1.2rem; }
        .nav-btn-download span { font-weight: 800; }

        .pdf-clone-container { position: fixed; top: -9999px; left: -9999px; width: 720px; visibility: hidden; }
        @media print {
            @page { size: A4; margin: 0.5cm; }
            body * { visibility: hidden; }
            .invoice-preview, .invoice-preview * { visibility: visible; }
            .invoice-preview { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; }
            header, .main-container>.card, .bottom-nav, .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="header-left">
            <img src="images/logo1.png" alt="FAZGAME Logo" class="logo-img" onerror="this.src='https://placehold.co/300x300/222/ffd84d?text=FAZ';">
            <div class="logo-text"><span class="yellow-text">FAZ</span>GAME | <span class="yellow-text">SUITE</span></div>
        </div>
        <div class="header-right-group">
            <div class="header-logos">
                <img src="https://api.iconify.design/simple-icons/playstation.svg" alt="PS">
                <img src="https://api.iconify.design/simple-icons/xbox.svg" alt="Xbox">
                <img src="https://api.iconify.design/simple-icons/nintendoswitch.svg" alt="Switch">
                <img src="https://api.iconify.design/mdi/desktop-classic.svg" alt="PC">
            </div>
            <a href="index.html" class="btn-icon" title="Home"><i class="fa-solid fa-house"></i></a>
        </div>
    </div>
</header>

<div class="main-container">
    <!-- File Manager -->
    <div class="card collapsible" id="storageCard">
        <div class="card-header" onclick="toggleCard('storageCard')">
            <i class="fa-solid fa-cloud-arrow-up"></i> File Vault
            <i class="fa-solid fa-chevron-down toggle-arrow"></i>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label>Document Name</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="storageKeyName" placeholder="e.g., Fikri - Jan Invoice" style="flex:1">
                    <button class="btn-icon" onclick="app.autoGenerateName()"><i class="fa-regular fa-lightbulb"></i></button>
                </div>
            </div>
            <div class="file-actions-grid">
                <div class="file-action-card" onclick="app.saveToLocalStorage()"><i class="fa-solid fa-floppy-disk"></i><span>Save Local</span></div>
                <div class="file-action-card" onclick="app.exportToJsonFile()"><i class="fa-solid fa-download"></i><span>Export JSON</span></div>
                <label class="file-action-card" style="cursor:pointer;"><i class="fa-solid fa-upload"></i><span>Import JSON</span><input type="file" id="importJsonInput" accept=".json" style="display:none;" onchange="app.importFromJsonFile(this.files)"></label>
                <div class="file-action-card" id="gdrive-signin" onclick="app.initGoogleDrive()"><i class="fa-brands fa-google"></i><span>Connect Drive</span></div>
                <div class="file-action-card" id="gdrive-save" onclick="app.saveToDrive()" style="opacity:0.6; pointer-events:none;"><i class="fa-brands fa-google-drive"></i><span>Save to Drive</span></div>
                <div class="file-action-card" id="gdrive-load" onclick="app.loadFromDrive()" style="opacity:0.6; pointer-events:none;"><i class="fa-solid fa-folder-open"></i><span>Load from Drive</span></div>
            </div>
            <div id="driveStatus" class="drive-status"><i class="fa-regular fa-circle"></i> Not connected</div>
            <div style="font-size:0.7rem; font-weight:700; color:var(--text-dim); margin-top:8px;">📁 Local Archives</div>
            <div class="doc-list-container" id="localDocsList"></div>
        </div>
    </div>

    <!-- Settings -->
    <div class="card">
        <div class="card-header"><i class="fa-solid fa-sliders"></i> Settings</div>
        <div class="card-body">
            <div class="form-row">
                <div class="form-group"><label>Document Type</label><select id="docTypeSelect"><option value="INVOICE">Invoice</option><option value="QUOTATION">Quotation</option><option value="RECEIPT">Receipt</option></select></div>
                <div class="form-group"><label>Currency</label><select id="invCurrency"><option value="MYR">MYR (RM)</option><option value="USD">USD ($)</option></select></div>
            </div>
        </div>
    </div>

    <!-- Company Details -->
    <div class="card collapsible collapsed" id="companyCard">
        <div class="card-header" onclick="toggleCard('companyCard')"><i class="fa-solid fa-building"></i> Company Details <i class="fa-solid fa-chevron-down toggle-arrow"></i></div>
        <div class="card-body">
            <div class="form-group"><label>Company Name</label><input type="text" id="compName" value="FAZ GAME EMPIRE" oninput="app.updatePreview()"></div>
            <div class="form-group"><label>SSM Reg No</label><input type="text" id="compSSM" value="LA0077351-H" oninput="app.updatePreview()"></div>
            <div class="form-group"><label>Address</label><textarea id="compAddr" rows="3" oninput="app.updatePreview()">Block B, Cerrado Executive Suites,
JIn Southville 1, Southville City,
43800 Dengkil Selangor</textarea></div>
            <div class="form-row"><div class="form-group"><label>Phone</label><input type="tel" id="compPhone" value="0163691936" oninput="app.updatePreview()"></div><div class="form-group"><label>Email</label><input type="email" id="compEmail" value="fazgame.empire@gmail.com" oninput="app.updatePreview()"></div></div>
        </div>
    </div>

    <!-- Client & Billing -->
    <div class="card"><div class="card-header"><i class="fa-solid fa-user-tag"></i> Client & Billing</div><div class="card-body">
        <div class="form-group"><label>Client Name *</label><input type="text" id="custName" placeholder="Ahmad Fikri" oninput="app.updatePreview()"></div>
        <div class="form-group"><label>Phone *</label><input type="tel" id="custPhone" placeholder="0123456789" oninput="app.updatePreview()"></div>
        <div class="form-group"><label>Email</label><input type="email" id="custEmail" placeholder="optional" oninput="app.updatePreview()"></div>
        <div class="form-group"><label>Company Name</label><input type="text" id="custCompany" placeholder="optional" oninput="app.updatePreview()"></div>
        <div class="form-group"><label>Billing Address</label><textarea id="custAddr" rows="2" placeholder="optional" oninput="app.updatePreview()"></textarea></div>
        <hr style="border-color:var(--border);">
        <div class="form-group"><label id="formSerialLabel">Document No.</label><input type="text" id="invNumber" value="INV-2026-0042" oninput="app.updatePreview()"></div>
        <div class="form-row"><div class="form-group"><label>Issue Date</label><input type="date" id="invDate" oninput="app.updatePreview()"></div><div class="form-group"><label>Due Date</label><input type="date" id="invDueDate" oninput="app.updatePreview()"></div></div>
    </div></div>

    <!-- Line Items -->
    <div class="card"><div class="card-header"><i class="fa-solid fa-box-open"></i> Line Items</div><div class="card-body">
        <div class="item-search-area"><i class="fa-solid fa-magnifying-glass search-icon"></i><input type="text" class="search-input" id="itemSearch" placeholder="Search product..."><div class="search-dropdown" id="searchDropdown"></div></div>
        <div id="itemsBody"></div>
        <button class="btn btn-sm" style="width:100%; border:1px dashed var(--border); background:transparent;" onclick="app.appendRowEntry()"><i class="fa-solid fa-plus"></i> Add item</button>
    </div></div>

    <!-- Summary -->
    <div class="card"><div class="card-header"><i class="fa-solid fa-calculator"></i> Summary & Discount</div><div class="card-body">
        <div class="form-row"><div class="form-group"><label>Discount Type</label><select id="discountType"><option value="none">No Discount</option><option value="percent">Percentage (%)</option><option value="fixed">Fixed Amount</option></select></div><div class="form-group"><label>Discount Value</label><input type="number" id="discountValue" value="0" step="0.01"></div></div>
        <div class="form-row" style="background:var(--surface-light); padding:12px; border-radius:var(--radius-md);"><div class="form-group"><label>Subtotal</label><input type="text" id="subtotalDisplay" readonly></div><div class="form-group"><label>Total</label><input type="text" id="grandTotalDisplay" readonly style="color:var(--accent); font-weight:800; font-size:1.4rem;"></div></div>
    </div></div>

    <!-- Payment & Notes -->
    <div class="card collapsible collapsed" id="paymentCard"><div class="card-header" onclick="toggleCard('paymentCard')"><i class="fa-solid fa-credit-card"></i> Payment & Notes <i class="fa-solid fa-chevron-down toggle-arrow"></i></div><div class="card-body">
        <div class="form-group"><label>Bank Name</label><input type="text" id="bankName" value="OCBC Bank" oninput="app.updatePreview()"></div>
        <div class="form-group"><label>Account Name</label><input type="text" id="acctName" value="FAZ GAME EMPIRE" oninput="app.updatePreview()"></div>
        <div class="form-group"><label>Account Number</label><input type="text" id="acctNumber" value="1061030056" oninput="app.updatePreview()"></div>
        <hr><div class="form-group"><label>Notes</label><textarea id="notesText" rows="2" oninput="app.updatePreview()">Thank you for your purchase.</textarea></div>
    </div></div>

    <div class="no-print" style="text-align:center;"><span style="font-size:0.75rem; color:var(--text-dim);"><i class="fa-regular fa-eye"></i> Preview</span></div>
    <div class="preview-wrapper"><div class="invoice-preview" id="invoicePreview"></div></div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <button class="nav-btn" onclick="app.clearForm()"><i class="fa-solid fa-rotate-right"></i><span>Reset</span></button>
    <button class="nav-btn" id="paidNavBtn" onclick="app.togglePaidStamp()"><i class="fa-solid fa-certificate"></i><span>Stamp</span></button>
    <button class="nav-btn nav-btn-download" onclick="app.downloadPDF()"><i class="fa-solid fa-download"></i><span>PDF</span></button>
    <button class="nav-btn" onclick="app.sharePDF()"><i class="fa-solid fa-share-nodes"></i><span>Share</span></button>
</div>

<div class="pdf-clone-container" id="pdfCloneContainer"></div>

<script>
    window.toggleCard = function(id) { document.getElementById(id)?.classList.toggle('collapsed'); };

    const app = (function() {

        async function saveToDrive() {
            if(!accessToken) { alert("Please connect Google Drive first."); return; }
            const data = getCurrentPayload();
            const clientName = (data.custName || "document").replace(/[^a-z0-9]/gi, '_').slice(0,30);
            const phone = (data.custPhone || "no-phone").replace(/[^0-9+]/g, '').slice(0,15);
            const fileName = `${clientName}_${phone}.json`;
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const metadata = { name: fileName, parents: ['root'] };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', blob);
            try {
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` },
                    body: form
                });
                const result = await response.json();
                if(result.id) {
                    document.getElementById('driveStatus').innerHTML = `<i class="fa-regular fa-circle-check"></i> Saved: ${fileName}`;
                    setTimeout(() => document.getElementById('driveStatus').innerHTML = '<i class="fa-regular fa-circle-check"></i> Connected to Drive', 3000);
                    alert(`✅ Saved to Drive as "${fileName}"`);
                } else {
                    alert("Upload failed: " + (result.error?.message || "unknown error"));
                }
            } catch(e) { alert("Error saving to Drive: " + e.message); }
        }

                .addView(new google.picker.DocsView().setIncludeFolders(true).setMimeTypes('application/json'))
                .setOAuthToken(accessToken)
                .setDeveloperKey(API_KEY)
                .setCallback(pickerCallback)
                .build();
            picker.setVisible(true);

                if(data.action === google.picker.Action.PICKED) {
                    const fileId = data.docs[0].id;
                    fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    }).then(res => res.json()).then(json => {
                        Object.keys(json).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = json[id]; });
