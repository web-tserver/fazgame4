<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FAZGAME | Pokémon Pixel Hub</title>
    <meta name="description" content="FAZGAME Hub – Invoice, Build Tracker, Profit & Loss, PC Builder, Inventory Management with Pokémon pixel characters">
    <!-- Original header fonts (Inter + Clash Display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,700,600&display=swap" rel="stylesheet">
    <!-- Pixel fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #111216;
            --text: #fff;
            --muted: #a0a0b0;
            --accent: #ffd84d;
            --accent-dark: #e6c43d;
            --border-color: rgba(255, 255, 255, 0.08);
            --header-bg: rgba(11, 11, 15, 0.5);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.06);
            --pixel-border: #ffd84d;
            --pixel-card-bg: #1e1b2cee;
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg-secondary: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --accent: #eab308;
            --accent-dark: #ca8a04;
            --border-color: rgba(0, 0, 0, 0.1);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --glass-border: 1px solid rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        a { text-decoration: none; color: inherit; }

        /* Pixel animated background canvas (includes Pokémon) */
        #pixel-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        /* ========== ORIGINAL HEADER (glassmorphism) ========== */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--header-bg); backdrop-filter: var(--glass-blur);
            border-bottom: var(--glass-border); padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); flex-shrink: 0;
        }
        @media (min-width: 768px) { header { padding: 16px 24px; } }
        .header-inner {
            max-width: 1400px; margin: 0 auto; display: flex;
            align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-left .logo-img { height: 40px; width: auto; opacity: 0.95; }
        .header-left .logo-text {
            font-family: 'Clash Display', sans-serif;
            font-weight: 700; font-size: 24px; letter-spacing: -0.5px;
        }
        .header-left .logo-text span:last-child { color: var(--accent); }
        .header-logos { display: flex; gap: 12px; align-items: center; }
        @media (min-width: 768px) { .header-logos { gap: 20px; } }
        .header-logos img { width: 20px; transition: 0.3s ease; }
        body:not(.light-mode) .header-logos img { filter: invert(1); opacity: 0.7; }
        body.light-mode .header-logos img { filter: none; opacity: 0.8; }
        .header-logos img:hover { opacity: 1; transform: translateY(-2px); }
        @media (max-width: 680px) {
            .header-inner { flex-direction: column; align-items: center; }
            .header-logos { justify-content: center; }
        }

        /* Main content */
        .main-content {
            flex: 1;
            position: relative;
            z-index: 2;
            padding: 28px 16px;
        }
        @media (min-width: 768px) { .main-content { padding: 48px 24px; } }
        .hub-container {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        /* Pixel title */
        .hub-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .hub-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.8rem;
            letter-spacing: 1px;
            line-height: 1.3;
            margin: 0 0 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            text-shadow: 3px 3px 0 #ff00aa, 5px 5px 0 #00ffcc;
        }
        @media (min-width: 768px) { .hub-title { font-size: 2.2rem; gap: 12px; } }
        @media (max-width: 640px) { .hub-title { font-size: 1.2rem; gap: 6px; text-shadow: 2px 2px 0 #ff00aa, 3px 3px 0 #00ffcc; } }
        .faz-white { color: var(--text); }
        .game-hub-yellow { color: var(--accent); }

        .hub-system-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #00ffcc;
            background: #00000066;
            display: inline-block;
            padding: 6px 12px;
            border: 2px solid var(--accent);
            box-shadow: inset 0px 0px 0px 1px #ffffff22, 3px 3px 0px black;
        }

        /* Pixel card grid - responsive 2 cols on mobile */
        .card-grid {
            display: grid;
            gap: 24px;
            padding: 4px;
        }
        @media (min-width: 1025px) { .card-grid { grid-template-columns: repeat(3, 1fr); gap: 28px; } }
        @media (min-width: 769px) and (max-width: 1024px) { .card-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media (min-width: 641px) and (max-width: 768px) { .card-grid { grid-template-columns: repeat(2, 1fr); gap: 22px; } }
        @media (max-width: 640px) { .card-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
        @media (max-width: 480px) { .card-grid { gap: 14px; } }

        /* Pixel Card */
        .hub-card {
            background: var(--pixel-card-bg);
            border: 3px solid var(--pixel-border);
            box-shadow: 6px 6px 0px 0px #000000aa;
            border-radius: 0px;
            aspect-ratio: 4 / 3;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
            transition: all 0.05s linear;
            text-align: center;
        }
        .hub-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px #000000cc;
            background: #2a2640;
            border-color: #ffcc33;
        }
        .hub-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px black;
        }

        .card-icon-wrapper {
            width: 64px;
            height: 64px;
            background: #00000077;
            border: 2px solid var(--accent);
            box-shadow: inset 0 0 0 2px #ffffff22, 3px 3px 0 black;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }
        .hub-card:hover .card-icon-wrapper {
            background: #000000aa;
            border-color: #fff;
        }
        .card-icon-wrapper svg {
            width: 36px;
            height: 36px;
            stroke: var(--accent);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(1px 1px 0 black);
        }
        @media (max-width: 640px) {
            .card-icon-wrapper { width: 52px; height: 52px; margin-bottom: 10px; }
            .card-icon-wrapper svg { width: 28px; height: 28px; }
        }
        .card-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.75rem;
            line-height: 1.4;
            color: white;
            text-shadow: 1px 1px 0 #000;
        }
        @media (min-width: 768px) { .card-title { font-size: 0.85rem; } }
        @media (max-width: 640px) { .card-title { font-size: 0.65rem; } }
        .card-arrow {
            margin-top: 8px;
            font-size: 1rem;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.1s ease;
            color: #00ffcc;
        }
        .hub-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(2px);
        }

        footer {
            text-align: center;
            padding: 24px 20px;
            color: var(--muted);
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            background: var(--header-bg);
            backdrop-filter: var(--glass-blur);
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            border: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .back-to-top.visible { opacity: 1; visibility: visible; }
        .back-to-top:hover { background: var(--accent-dark); transform: translateY(-3px); }
    </style>
</head>
<body>

    <canvas id="pixel-canvas"></canvas>
    <div class="back-to-top" id="backToTop">↑</div>

    <header>
        <div class="header-inner">
            <div class="header-left">
                <img src="images/logo1.png" alt="FAZGAME Logo" class="logo-img" onerror="this.src='https://placehold.co/300x300/222/ffd84d?text=FAZGAME';">

    <script>
        (function pixelAndPokemonBackground() {
            const canvas = document.getElementById('pixel-canvas');
            if (!canvas) return;
            let ctx = canvas.getContext('2d');
            let width, height;
            let pixels = [];
            let pokemons = [];

            // ---------- Pixel blocks (falling) ----------
            class PixelBlock {
                constructor(x, y, size, speed, color) {
                    this.x = x; this.y = y; this.size = size; this.speed = speed; this.color = color;
                }
                update() {
                    this.y += this.speed;
                    if (this.y > height + this.size) {
                        this.y = -this.size;
                        this.x = Math.random() * width;
                        this.speed = 0.8 + Math.random() * 2.5;
                    }
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                    ctx.strokeStyle = '#00000044';
                    ctx.strokeRect(this.x, this.y, this.size, this.size);
                }
            }

            function initPixels() {
                const pixelCount = Math.min(100, Math.floor((width * height) / 6000));
                pixels = [];
                const palette = ['#ffd84d', '#ffaa44', '#ff5e7e', '#9b4dff', '#2ecc71', '#00ffcc', '#ff66cc'];
                for (let i = 0; i < pixelCount; i++) {
                    let size = 6 + Math.floor(Math.random() * 10);
                    let x = Math.random() * width;
                    let y = Math.random() * height;
                    let speed = 0.6 + Math.random() * 2.5;
                    let color = palette[Math.floor(Math.random() * palette.length)];
                    pixels.push(new PixelBlock(x, y, size, speed, color));
                }
                for (let i = 0; i < 50; i++) {
                    let size = 3;
                    let x = Math.random() * width;
                    let y = Math.random() * height;
                    let speed = 0.3 + Math.random() * 1.5;
                    pixels.push(new PixelBlock(x, y, size, speed, '#ffd84d'));
                }
            }

            // ---------- Pixel Pokémon (wandering) ----------
            class PokemonSprite {
                constructor(x, y, type) {
                    this.x = x;
                    this.y = y;
                    this.type = type; // 'pikachu', 'charmander', 'bulbasaur', 'squirtle'
                    this.w = 16;
                    this.h = 16;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = (Math.random() - 0.5) * 0.6;
                    this.step = 0;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    // boundaries with padding
                    if (this.x < 10) { this.x = 10; this.vx = -this.vx; }
                    if (this.x > width - this.w - 10) { this.x = width - this.w - 10; this.vx = -this.vx; }
                    if (this.y < 10) { this.y = 10; this.vy = -this.vy; }
                    if (this.y > height - this.h - 10) { this.y = height - this.h - 10; this.vy = -this.vy; }
                    
                    // occasional small random direction change
                    if (Math.random() < 0.01) {
                        this.vx += (Math.random() - 0.5) * 0.3;
                        this.vy += (Math.random() - 0.5) * 0.3;
                        let maxSpeed = 1.2;
                        if (this.vx > maxSpeed) this.vx = maxSpeed;
                        if (this.vx < -maxSpeed) this.vx = -maxSpeed;
                        if (this.vy > maxSpeed) this.vy = maxSpeed;
                        if (this.vy < -maxSpeed) this.vy = -maxSpeed;
                    }
                    this.step++;
                }
                draw(ctx) {
                    ctx.save();
                    // pixel perfect rendering
                    ctx.imageSmoothingEnabled = false;
                    const px = Math.floor(this.x);
                    const py = Math.floor(this.y);
                    
                    // Draw pixel art based on type
                    if (this.type === 'pikachu') {
                        // Yellow body
                        ctx.fillStyle = '#ffde34';
                        ctx.fillRect(px+2, py+4, 12, 10);
                        ctx.fillStyle = '#b87c00';
                        ctx.fillRect(px, py+2, 2, 4);  // left ear
                        ctx.fillRect(px+14, py+2, 2, 4); // right ear
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(px+4, py+8, 2, 2); // eye left
                        ctx.fillRect(px+10, py+8, 2, 2); // eye right
                        ctx.fillStyle = '#cc4400';
                        ctx.fillRect(px+6, py+12, 4, 2); // cheek dots
                        ctx.fillStyle = '#6b3e00';
                        ctx.fillRect(px+6, py+10, 4, 1); // mouth
                    } 
                    else if (this.type === 'charmander') {
                        ctx.fillStyle = '#ff8c42';
                        ctx.fillRect(px+2, py+4, 12, 10);
                        ctx.fillStyle = '#cc5a20';
                        ctx.fillRect(px+4, py+12, 8, 2);
                        ctx.fillStyle = '#ff3a00';
                        ctx.fillRect(px+12, py+6, 4, 6); // flame tail
                        ctx.fillRect(px+14, py+8, 2, 4);
                        ctx.fillStyle = '#000';
                        ctx.fillRect(px+5, py+7, 2, 2);
                        ctx.fillRect(px+9, py+7, 2, 2);
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(px+4, py+10, 8, 1);
                    }
                    else if (this.type === 'bulbasaur') {
                        ctx.fillStyle = '#7cb518';
                        ctx.fillRect(px+2, py+4, 12, 10);
                        ctx.fillStyle = '#3c8d2f';
                        ctx.fillRect(px+6, py+0, 4, 6); // bulb
                        ctx.fillStyle = '#000';
                        ctx.fillRect(px+5, py+7, 2, 2);
                        ctx.fillRect(px+9, py+7, 2, 2);
                        ctx.fillStyle = '#8b5a2b';
                        ctx.fillRect(px+4, py+11, 2, 2);
                        ctx.fillRect(px+10, py+11, 2, 2);
                    }
                    else if (this.type === 'squirtle') {
                        ctx.fillStyle = '#6bc9ff';
                        ctx.fillRect(px+2, py+4, 12, 10);
                        ctx.fillStyle = '#3e6b8c';
                        ctx.fillRect(px+6, py+2, 4, 3); // shell top
                        ctx.fillStyle = '#000';
                        ctx.fillRect(px+5, py+7, 2, 2);
                        ctx.fillRect(px+9, py+7, 2, 2);
                        ctx.fillStyle = '#cc9955';
                        ctx.fillRect(px+7, py+12, 2, 2);
                    }
                    
                    // outline for all
                    ctx.strokeStyle = '#000000aa';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(px, py, 16, 16);
                    ctx.restore();
                }
            }

            function initPokemons() {
                pokemons = [];
                const types = ['pikachu', 'charmander', 'bulbasaur', 'squirtle'];
                // Spawn 6-8 wandering pokemon
                const count = Math.min(8, Math.max(5, Math.floor((width * height) / 40000)));
                for (let i = 0; i < count; i++) {
                    let x = 20 + Math.random() * (width - 50);
                    let y = 20 + Math.random() * (height - 50);
                    let type = types[Math.floor(Math.random() * types.length)];
                    pokemons.push(new PokemonSprite(x, y, type));
                }
                // Guarantee at least one Pikachu
                if (!pokemons.some(p => p.type === 'pikachu')) {
                    pokemons.push(new PokemonSprite(width/2, height/3, 'pikachu'));
                }
            }

            // Background grid
            function drawBackgroundGrid() {
                ctx.fillStyle = '#0c0b1a';
                ctx.fillRect(0, 0, width, height);
                ctx.strokeStyle = '#2a2740';
                ctx.lineWidth = 1;
                const step = 28;
                for (let x = 0; x < width; x += step) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }
                for (let y = 0; y < height; y += step) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
                ctx.fillStyle = '#ffffff08';
                for (let i = 0; i < height; i += 4) {
                    ctx.fillRect(0, i, width, 1);
                }
            }

            function resizeAndReset() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initPixels();
                initPokemons();
            }

            function animate() {
                if (!ctx) return;
                drawBackgroundGrid();
                // update & draw falling pixels
                for (let p of pixels) {
                    p.update();
                    p.draw();
                }
                // update & draw pokemon
                for (let mon of pokemons) {
                    mon.update();
                    mon.draw(ctx);
                }
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resizeAndReset();
            });
            resizeAndReset();
            animate();
        })();

        // Back to top
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => backToTop.classList.toggle('visible', window.scrollY > 200));
        backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // Logo fallback
        const logo = document.querySelector('.logo-img');
        if (logo && logo.complete && logo.naturalWidth === 0) {
            logo.onerror = null;
            logo.src = 'https://placehold.co/300x300/222/ffd84d?text=FAZGAME';
        }

        document.querySelectorAll('.hub-card[href="#"]').forEach(card => {
            card.addEventListener('click', (e) => e.preventDefault());
        });
    </script>
</body>
</html>
